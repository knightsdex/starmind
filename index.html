<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STARMIND - $STARMIND</title>
    <link rel="icon" href="assets/logo_bg.png" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }

      body {
        background: linear-gradient(
          135deg,
          #0a1e3f 0%,
          #1a2e5f 50%,
          #0f1f40 100%
        );
        color: #e0e8ff;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      canvas#stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 560px;
        padding: 40px 20px 60px;
        margin: 0 auto;
      }

      .banner {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 40px;
        box-shadow: 0 20px 60px rgba(218, 165, 32, 0.2);
        border: 2px solid rgba(218, 165, 32, 0.3);
        animation: fadeIn 0.8s ease-out;
      }

      .banner img {
        width: 100%;
        height: auto;
        display: block;
      }

      .logo-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin-bottom: 40px;
      }

      .logo {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 4px solid rgba(218, 165, 32, 0.5);
        box-shadow: 0 0 40px rgba(218, 165, 32, 0.3),
          inset 0 0 40px rgba(218, 165, 32, 0.1);
        padding: 8px;
        background: rgba(10, 30, 63, 0.6);
        backdrop-filter: blur(10px);
        animation: float 4s ease-in-out infinite;
      }

      .logo img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: contain;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .title-section {
        text-align: center;
        margin-bottom: 30px;
        animation: fadeIn 1s ease-out 0.2s both;
      }

      .main-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 900;
        color: #daa520;
        margin-bottom: 8px;
        text-shadow: 0 0 30px rgba(218, 165, 32, 0.4);
        letter-spacing: -1px;
      }

      .subtitle {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        color: rgba(224, 232, 255, 0.7);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
        margin-bottom: 12px;
      }

      .asteroid-code {
        display: inline-block;
        background: rgba(218, 165, 32, 0.12);
        border: 1px solid rgba(218, 165, 32, 0.4);
        padding: 8px 20px;
        border-radius: 50px;
        font-family: "Inter", monospace;
        font-size: 0.95rem;
        color: #daa520;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .content-section {
        background: rgba(26, 46, 95, 0.5);
        border: 1px solid rgba(218, 165, 32, 0.25);
        border-radius: 12px;
        padding: 32px 28px;
        margin-bottom: 30px;
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-out 0.4s both;
      }

      .content-section h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        color: #daa520;
        margin-bottom: 16px;
        letter-spacing: -0.5px;
      }

      .content-section p {
        font-size: 0.95rem;
        line-height: 1.7;
        color: rgba(224, 232, 255, 0.85);
        margin-bottom: 12px;
      }

      .content-section p:last-child {
        margin-bottom: 0;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 20px;
      }

      .info-item {
        background: rgba(15, 31, 64, 0.6);
        border: 1px solid rgba(218, 165, 32, 0.2);
        padding: 16px;
        border-radius: 8px;
      }

      .info-label {
        font-size: 0.75rem;
        color: rgba(218, 165, 32, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
        font-weight: 600;
      }

      .info-value {
        font-size: 1rem;
        color: #daa520;
        font-weight: 500;
        font-family: "Inter", monospace;
      }

      .contract-box {
        background: rgba(26, 46, 95, 0.5);
        border: 1px solid rgba(218, 165, 32, 0.25);
        border-radius: 12px;
        padding: 24px 28px;
        margin-bottom: 30px;
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-out 0.5s both;
      }

      .contract-label {
        font-size: 0.75rem;
        color: rgba(218, 165, 32, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
        font-weight: 600;
      }

      .contract-input {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(15, 31, 64, 0.8);
        border: 1px solid rgba(218, 165, 32, 0.35);
        border-radius: 8px;
        padding: 12px 16px;
      }

      .contract-address {
        font-family: "Inter", monospace;
        font-size: 0.8rem;
        color: rgba(224, 232, 255, 0.7);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        letter-spacing: 0.02em;
      }

      .copy-btn {
        background: rgba(218, 165, 32, 0.15);
        border: 1px solid rgba(218, 165, 32, 0.4);
        color: #daa520;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        font-weight: 600;
        transition: all 0.2s;
        white-space: nowrap;
        text-transform: uppercase;
        text-decoration: none;
        display: inline-block;
      }

      .copy-btn:hover {
        background: rgba(218, 165, 32, 0.3);
        border-color: rgba(218, 165, 32, 0.7);
      }

      .copy-btn.copied {
        background: rgba(100, 200, 100, 0.18);
        border-color: rgba(100, 200, 100, 0.5);
        color: #7dd87d;
      }

      .verification {
        background: rgba(218, 165, 32, 0.08);
        border: 1px solid rgba(218, 165, 32, 0.2);
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        font-size: 0.85rem;
        color: rgba(224, 232, 255, 0.7);
        margin-bottom: 30px;
        animation: fadeIn 1s ease-out 0.6s both;
      }

      .verification a {
        color: #daa520;
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px solid rgba(218, 165, 32, 0.4);
        transition: border-color 0.2s;
      }

      .verification a:hover {
        border-color: rgba(218, 165, 32, 0.8);
      }

      .socials {
        display: flex;
        gap: 16px;
        margin-bottom: 40px;
        flex-wrap: wrap;
        justify-content: center;
        animation: fadeIn 1s ease-out 0.7s both;
      }

      .social-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 24px;
        background: rgba(218, 165, 32, 0.12);
        border: 1px solid rgba(218, 165, 32, 0.35);
        border-radius: 50px;
        color: #daa520;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        transition: all 0.25s;
        backdrop-filter: blur(6px);
      }

      .social-link:hover {
        background: rgba(218, 165, 32, 0.25);
        border-color: rgba(218, 165, 32, 0.6);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(218, 165, 32, 0.15);
      }

      .social-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .footer {
        font-size: 0.75rem;
        color: rgba(224, 232, 255, 0.35);
        text-align: center;
        letter-spacing: 0.05em;
        margin-top: auto;
        padding: 20px;
        animation: fadeIn 1s ease-out 0.8s both;
      }

      @media (max-width: 640px) {
        .info-grid {
          grid-template-columns: 1fr;
        }

        .content-section {
          padding: 20px 16px;
        }

        .contract-box {
          padding: 16px;
        }

        .contract-address {
          font-size: 0.7rem;
        }

        .socials {
          flex-direction: column;
        }

        .social-link {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>

    <script>
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");
      let stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
      }

      function initStars() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 2500);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.4,
            alpha: Math.random() * 0.6 + 0.2,
            twinkleSpeed: Math.random() * 0.02 + 0.008,
            twinklePhase: Math.random() * Math.PI * 2,
            color:
              Math.random() < 0.1
                ? "rgba(218,165,32,"
                : Math.random() < 0.2
                ? "rgba(200,220,255,"
                : "rgba(255,255,255,",
          });
        }
      }

      let t = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        stars.forEach((s) => {
          const twinkle =
            Math.sin(t * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.color + s.alpha * twinkle + ")";
          ctx.fill();
        });

        t++;
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      window.addEventListener("resize", resize);

      function copyContract() {
        const addr = document.getElementById("contractAddr").textContent;
        navigator.clipboard
          .writeText(addr)
          .then(() => {
            const btn = document.getElementById("copyBtn");
            btn.textContent = "COPIED!";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "Copy";
              btn.classList.remove("copied");
            }, 2000);
          })
          .catch(() => {
            alert("Failed to copy: " + addr);
          });
      }
    </script>
